<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .form-section { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .logout-btn { background-color: #dc3545; width: auto; float: right; }
    </style>

</head>
<body>

    <div class="container">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <h1>Admin Control Panel</h1>
        <p>Manage the factory's foundational data.</p>

        <div class="form-section">
            <h2>Add New Machine</h2>
            <form id="machineForm">
                <label>Machine ID (e.g., MCH-001)</label>
                <input type="text" id="machine_id" required>

                <label>Machine Name (e.g., CNC Lathe)</label>
                <input type="text" id="machine_name" required>

                <label>Machine Type</label>
                <input type="text" id="machine_type" required>

                <label>Last Maintenance</label>
                <input type="text" id="last_maintenance" required>

                <button type="submit">Register Machine</button>
            </form>
        </div>

        <div class="form-section">
            <h2>Add New Product</h2>
            <form id="productForm">
                <label>Product ID </label>
                <input type="text" id="product_id" required>

                <label>Product Name (e.g., 12V DC Motor)</label>
                <input type="text" id="product_name" required>

                <label>Product SKU (e.g., MOT-12V)</label>
                <input type="text" id="product_sku" required>
                
                <button type="submit">Register Product</button>
            </form>
        </div>
    </div>

</body>
</html>

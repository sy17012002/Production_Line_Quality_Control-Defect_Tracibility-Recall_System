<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Audit Logs</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; border-top: 5px solid #6c757d; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #343a40; font-family: Arial, sans-serif; }
        
        .logout-btn { background-color: #dc3545; color: white; border: none; cursor: pointer; font-weight: bold; width: auto; float: right; font-size: 14px; padding: 8px 15px; border-radius: 4px; }
        
        /* Search/Filter Bar */
        .filter-section { background-color: #f8f9fa; padding: 15px; border-radius: 5px; border: 1px solid #ddd; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }

        /* Secure Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        th { background-color: #343a40; color: white; font-family: Arial, sans-serif; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #e2e6ea; }
        
        /* Color-code specific actions for quick scanning */
        .action-fail { color: #dc3545; font-weight: bold; }
        .action-pass { color: #28a745; font-weight: bold; }
        .action-halt { color: #fd7e14; font-weight: bold; background-color: #fff3cd; }
    </style>

</head>
<body>

    <div class="container">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <h1>Security & Audit Trail</h1>
        <p>Immutable log of all critical system actions. This data cannot be altered or deleted.</p>

        <div class="filter-section">
            <input type="text" id="searchInput" placeholder="Search logs by User ID, Role, or Action Type..." onkeyup="filterLogs()">
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">Timestamp</th>
                    <th style="width: 10%;">User ID</th>
                    <th style="width: 20%;">Action Type</th>
                </tr>
            </thead>
            <tbody id="auditTableBody">
                <tr><td colspan="5" style="text-align: center;">Loading secure logs...</td></tr>
            </tbody>
        </table>
    </div>

</body>
</html>

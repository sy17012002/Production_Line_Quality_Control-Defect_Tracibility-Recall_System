<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Inspector Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .dashboard-container {
            background: #fff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #764ba2;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5a378c;
        }

        .toggle-text {
            margin-top: 1rem;
        }

        .toggle-text span {
            color: #764ba2;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div id="inspector-form" class="form-box">
            <h2>QC Inspector Portal</h2>
            <p>Evaluate production batches</p>
            <form action="/" method="POST">
                <input type="text" name="batch_id" id="batch-id" placeholder="Enter defective Batch ID" required>
                <input type="text" name="inspector_id" id="inspector-id" placeholder="Enter Inspector ID" required>
                <input type="text" name="inspection_id" id="inspection-id" placeholder="Enter Inspection ID" required>
                <select id="inspection-status" required>
                    <option value="">-- Pass or Fail --</option>
                    <option value="Pass">Pass</option>
                    <option value="Fail">Fail</option>
                </select>
                <select id="defect-type" required>
                    <option value="">-- Select Root Defect --</option>
                    <option value="ss">Surface Scratch</option>
                    <option value="de">Dimensional Error</option>
                    <option value="cm">Component Missing</option>
                    <option value="ce">Calibration Error</option>
                </select>
                <input type="file" id="evidence-image" name="evidence_image">
                <input type="date" name="inspection_date" id="inspection-date" placeholder="Inspection Date" required>
                <button type="submit" class="btn">Submit Quality Report</button>
            </form>

        </div>

    </div>

    <script>
        // inspector form submission handler
        const inspectorForm = document.querySelector('#inspector-form form');
        inspectorForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            const batch_id = document.getElementById('batch-id').value;
            const inspector_id = document.getElementById('inspector-id').value;
            const inspection_id = document.getElementById('inspection-id').value;
            const inspection_status = document.getElementById('inspection-status').value;
            const defect_type = document.getElementById('defect-type').value;
            const evidence = document.getElementById('evidence-image').files[0]; // Assuming you will handle file upload separately
            const inspection_date = document.getElementById('inspection-date').value;


            const res = await fetch('/api/inspector/evaluate_batch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ batch_id, inspector_id, inspection_id, inspection_status, defect_type, evidence, inspection_date })
            });

            const data = await res.json();

            if (data.redirect) {
                // window.location.href = `/${data.user.role}/dashboard`;
                alert('QC inspection submitted successfully');
            } else {
                alert(data.message || 'QC inspection failed');
            }
        });
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Manager - Recall Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
        }

        .dashboard-container {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 900px;
            margin: auto;
        }

        h2 {
            color: #333;
            margin-bottom: 5px;
        }

        p {
            color: #666;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background: #5a378c;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            background: #e6fffa;
            color: #2c7a7b;
            display: none;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            display: none;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
        }

        th {
            background: #764ba2;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .shipped {
            background: #c6f6d5;
            color: #22543d;
        }

        .pending {
            background: #fefcbf;
            color: #744210;
        }
    </style>
</head>

<body>

    <div class="dashboard-container">

        <!-- Recall Form -->
        <div id="recall-form">
            <h2>Recall Portal</h2>
            <p>Initiate Shipment Trace</p>

            <form>
                <input type="text" id="batch_id" placeholder="Enter defective Batch ID" required>
                <button type="submit" class="btn">Load Affected Shipments</button>
            </form>
        </div>

        <!-- Message -->
        <div id="message" class="message"></div>

        <!-- Shipment Table -->
        <table id="shipment-table">
            <thead>
                <tr>
                    <th>Shipment ID</th>
                    <th>Batch ID</th>
                    <th>Customer</th>
                    <th>Delivery Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>

    <script>
        const recallForm = document.querySelector('#recall-form form');

        recallForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            const batch_id = document.getElementById('batch_id').value;

            const res = await fetch('/api/recall/trace', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ batch_id })
            });

            const data = await res.json();

            console.log("Trace response:", data);

            // Show message
            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'block';
            messageDiv.innerText = data.message || "No message";

            // Show shipments
            const table = document.getElementById('shipment-table');
            const tbody = table.querySelector('tbody');
            tbody.innerHTML = '';

            if (data.shipments && data.shipments.length > 0) {
                table.style.display = 'table';

                data.shipments.forEach(shipment => {
                    const row = document.createElement('tr');

                    row.innerHTML = `
                    <td>${shipment.shipment_id}</td>
                    <td>${shipment.batch_id}</td>
                    <td>${shipment.customer_name}</td>
                    <td>${shipment.delivery_date}</td>
                    <td>
                        <span class="status ${shipment.status.toLowerCase()}">
                            ${shipment.status}
                        </span>
                    </td>
                `;

                    tbody.appendChild(row);
                });

            } else {
                table.style.display = 'none';
            }
        });
    </script>

</body>

</html>

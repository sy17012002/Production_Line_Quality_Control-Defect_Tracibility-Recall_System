<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Line Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-container {
            background: #fff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #764ba2;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5a378c;
        }

        .toggle-text {
            margin-top: 1rem;
        }

        .toggle-text span {
            color: #764ba2;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div id="login-form" class="form-box">
            <h2>Welcome Back</h2>
            <p>Enter your details</p>
            <form action="/api/auth/login" method="POST">
                <input type="email" id="login-email" name="email" placeholder="Email" required>
                <input type="password" id="login-password" name="password" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
            </form>

            <p class="toggle-text">Don't have an account? <span onclick="toggleForm()">Sign Up</span></p>
        </div>

        <div id="signup-form" class="form-box hidden">
            <h2>Create Account</h2>
            <p>Fill the form! It only takes a minute</p>
            <form action="/api/auth/signup" method="POST">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="text" name="role" placeholder="Role" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <p class="toggle-text">Already have an account? <span onclick="toggleForm()">Login</span></p>
        </div>
    </div>

    <script>
        function toggleForm() {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');

            loginForm.classList.toggle('hidden');
            signupForm.classList.toggle('hidden');
        }
    </script>
    <script>
    const loginForm = document.querySelector('#login-form form');
    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.redirect) {
            window.location.href = `/${data.user.role}/dashboard`;
        } else {
            alert(data.message || 'Login failed');
        }
    });
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .dashboard-container {
            background: #fff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #764ba2;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5a378c;
        }

        .toggle-text {
            margin-top: 1rem;
        }

        .toggle-text span {
            color: #764ba2;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div id="operator-form" class="form-box">
            <h2>Operator Portal</h2>
            <p>Log a new production run below</p>
            <form action="/" method="POST">
                <input type="text" name="batch_id" placeholder="Enter defective Batch ID" required>
                <input type="text" name="product_id" placeholder="Enter defective Machine ID" required>
                <input type="text" name="machine_id" placeholder="Enter defective Product ID" required>
                <select id="shift" required>
                    <option value="">-- Select Shift --</option>
                    <option value="Morning">Morning (06:00 - 14:00)</option>
                    <option value="Evening">Evening (14:00 - 22:00)</option>
                    <option value="Night">Night (22:00 - 06:00)</option>
                </select>
                <input type="number" name="quantity" placeholder="Enter quantity produced" required>
                <input type="date" name="production_date" placeholder="Production Date" required>
                <button type="submit" class="btn">Log Production Batch</button>
            </form>

        </div>

    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Inspector Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .form-section { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        input, select, button, textarea { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; box-sizing: border-box; }
        
        /* Blue button for the Inspector role */
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .logout-btn { background-color: #dc3545; width: auto; float: right; font-size: 14px; padding: 8px 15px; }
        
        /* Hide the defect section by default */
        #defectSection { display: none; background-color: #fff3cd; padding: 10px; border-left: 4px solid #ffc107; border-radius: 4px; margin-bottom: 15px; }
    </style>

</head>
<body>

    <div class="container">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <h1>QC Inspector Portal</h1>
        <p>Evaluate production batches. If a batch fails, you must log the defect type to ensure traceability.</p>

        <div class="form-section">
            <form id="inspectionForm">
                
                <label>Inspection ID</label>
                <input type="text" id="inspection_id" placeholder="e.g., INS-001" required>

                <label>Batch ID</label>
                <input type="text" id="batch_id" placeholder="e.g., BCH-001" required>

                <label>Inspector Id</label>
                <input type="text" id="inspector_id" placeholder="e.g., INS-001" required>

                
                <label>Inspection Status</label>
                <select id="status" required>
                    <option value="">-- Pass or Fail? --</option>
                    <option value="Pass">Pass - Meets Quality Standards</option>
                    <option value="Fail">Fail - Defect Detected</option>
                </select>

                <label><strong>Defect Type (Required for failures)</strong></label>
                <select id="defect_type">
                    <option value="">-- Select Root Defect --</option>
                    <option value="Surface Scratch">Surface Scratch</option>
                    <option value="Dimensional Error">Dimensional Error</option>
                    <option value="Component Missing">Component Missing</option>
                    <option value="Calibration Error">Calibration Error</option>
                </select>

                <label>Evidence Image</label>
                <input type="file" id="evidence_image" accept="image/*" required>

                <label>Inspection Time</label>
                <input type="datetime-local" id="inspection_time" required>
                
                <button type="submit">Submit Quality Report</button>
            </form>
        </div>
    </div>

</body>
</html>
